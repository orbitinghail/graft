name: Check docs

on:
  push:
    branches: ["main"]
    paths:
      - "docs/**"
  pull_request:
    branches: ["main"]
    paths:
      - "docs/**"
  workflow_dispatch:
  schedule:
    # Run every day at 7:00 AM UTC = 12:00 AM PST
    - cron: " 0  7  *  *  *"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checkDocs:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          token: ${{secrets.GITHUB_TOKEN}}
          persist-credentials: false
      - uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4.2.0
        with:
          version: 10.27
      - uses: actions/setup-node@395ad3262231945c25e8478fd5baf05154b1d79f # v6
        with:
          cache-dependency-path: "docs"
          node-version: "23"
          cache: "pnpm"

      - name: Build docs
        working-directory: docs
        run: |
          pnpm install
          pnpm build

      - name: Cache lychee results
        uses: actions/cache@v4
        with:
          path: docs/.lycheecache
          key: ${{ runner.os }}-lychee-${{ hashFiles('docs/pnpm-lock.yaml', 'docs/src/**', 'docs/public/**', 'docs/astro.config.mjs') }}
          restore-keys: |
            ${{ runner.os }}-lychee-

      - name: Check links
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2.8.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          workingDirectory: docs
          args: >-
            --user-agent 'curl/8.13.0'
            --cache
            --max-cache-age 7d
            --cache-exclude-status 429
            --accept 429
            --max-concurrency 4
            --no-progress
            --remap "https://graft.rs file://$PWD/dist"
            --fallback-extensions html
            --exclude-path "llms-.*\.txt"
            --root-dir $PWD/dist
            --host-stats
            --host-request-interval 500ms
            dist
          failIfEmpty: true
          format: markdown
          jobSummary: true
          token: ${{ secrets.GITHUB_TOKEN }}
